spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    enabled: false

logging:
  level:
    com.mordvinov.subscriptionservice: DEBUG

management:
  tracing:
    enabled: false
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
    enabled: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
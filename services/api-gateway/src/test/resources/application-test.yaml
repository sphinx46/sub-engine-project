spring:
  application:
    name: api-gateway-test

  cloud:
    gateway:
      enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/test-realm/protocol/openid-connect/certs

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 2
          max-idle: 2
          min-idle: 0

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    ru.cs.vsu.sub_engine.api_gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.reactive: DEBUG
    org.springframework.data.redis: INFO
    org.springframework.boot.test: DEBUG

app:
  gateway:
    signature-secret: test-signature-secret-for-unit-tests-only

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
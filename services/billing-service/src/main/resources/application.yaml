spring:
  application:
    name: billing-service
  profiles:
    active: dev
  jpa:
    open-in-view: false

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  packages-to-scan: mordvinov_dev.billing_service
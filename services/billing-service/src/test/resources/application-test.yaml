spring:
  datasource:
    url: jdbc:tc:postgresql:17-alpine:///billing_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test_user
    password: test_password
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 5
        order_inserts: true
        order_updates: true
  flyway:
    enabled: false
  kafka:
    enabled: false
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/sub-engine
          jwk-set-uri: http://localhost:8080/realms/sub-engine/protocol/openid-connect/certs

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    mordvinov_dev.billing_service: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.springframework.security.oauth2.jwt: DEBUG
    org.springframework.transaction: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    com.netflix.discovery: OFF
    org.springframework.cloud.netflix.eureka: OFF

youkassa:
  shop-id: test_shop_id
  secret-key: test_secret_key
  return-url: http://localhost:8084/api/billing/return
  webhook-url: http://localhost:8084/api/billing/webhook
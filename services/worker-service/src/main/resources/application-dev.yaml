spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongodb:27017/worker}
      database: worker
      auto-index-creation: true
      repositories:
        enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: worker-service-group
      auto-offset-reset: earliest
      max-poll-records: 10
      properties:
        spring.json.trusted.packages: "mordvinov_dev.worker_service.event"
        spring.json.type.mapping: "paymentEvent:mordvinov_dev.worker_service.event.PaymentEvent"
    admin:
      properties:
        bootstrap.servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

  mail:
    host: ${MAIL_HOST:maildev}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          debug: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    enabled: true
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 5
    instance-info-replication-interval-seconds: 5
    initial-instance-info-replication-interval-seconds: 5
  instance:
    hostname: worker-service
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15
    status-page-url-path: /actuator/info
    health-check-url-path: /actuator/health

server:
  port: ${WORKER_SERVICE_PORT:8083}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    enabled: false
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://tempo:9411/api/v2/spans

logging:
  level:
    mordvinov_dev.worker_service: DEBUG
    org.springframework.kafka: INFO
    org.springframework.data.mongodb: INFO
    org.springframework.mail: DEBUG
  pattern:
    level: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'

kafka:
  topics:
    payment-events: payment.events

notification:
  email:
    recipient: ${NOTIFICATION_EMAIL_RECIPIENT:user@example.com}
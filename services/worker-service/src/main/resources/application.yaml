spring:
  application:
    name: worker-service
  profiles:
    active: dev

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    mordvinov_dev.worker_service: DEBUG
    org.springframework.web: INFO
    org.springframework.kafka: INFO
    org.springframework.data.mongodb: INFO

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  packages-to-scan: mordvinov_dev.worker_service
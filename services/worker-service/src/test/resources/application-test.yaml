spring:
  data:
    mongodb:
      uri: ${MONGODB_TEST_URI:mongodb://localhost:27017/test}
      auto-index-creation: true
      repositories:
        enabled: true

  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      group-id: worker-service-test
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: paymentEvent:mordvinov_dev.worker_service.event.PaymentEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: record
      concurrency: 1

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

eureka:
  client:
    enabled: false

server:
  port: 0

logging:
  level:
    mordvinov_dev.worker_service: DEBUG
    org.testcontainers: INFO
    com.github.dockerjava: INFO

kafka:
  topics:
    payment-events: payment.events.test

notification:
  email:
    recipient: test@example.com
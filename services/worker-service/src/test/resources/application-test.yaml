spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/test
      database: test
      auto-index-creation: true
      repositories:
        enabled: true

  kafka:
    enabled: false
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      group-id: worker-service-test-group
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "mordvinov_dev.worker_service.event"
        spring.json.type.mapping: "paymentEvent:mordvinov_dev.worker_service.event.PaymentEvent"

  mail:
    host: localhost
    port: 1025
    username:
    password:
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

eureka:
  client:
    enabled: false

logging:
  level:
    mordvinov_dev.worker_service: DEBUG
    org.springframework.kafka: INFO
    org.springframework.data.mongodb: INFO
    org.springframework.mail: DEBUG

management:
  tracing:
    enabled: false
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
    enabled: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

kafka:
  topics:
    payment-events: payment.events.test

notification:
  email:
    recipient: test@example.com
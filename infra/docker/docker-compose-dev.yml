services:
  eureka-server:
    build:
      context: ../../services/eureka-server
    container_name: eureka-server
    ports:
      - "${EUREKA_SERVER_PORT:-8761}:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SERVER_PORT=8761
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=eureka-server
      - EUREKA_SERVER_ENABLE_SELF_PRESERVATION=false
      - EUREKA_SERVER_EVICTION_INTERVAL_TIMER_IN_MS=5000
    env_file:
      - ../../.env.dev
    networks:
      - sub-engine-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-gateway:
    build:
      context: ../../services/api-gateway
    container_name: api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8084}:8084"
    env_file:
      - ../../.env.dev
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE=http://eureka-server:8761/eureka/
      - KEYCLOAK_ISSUER_URI=${KEYCLOAK_ISSUER_URI}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - SIGNATURE_KEY_SECRET=${SIGNATURE_KEY_SECRET}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVER_PORT=8084
    depends_on:
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - sub-engine-network

  subscription-service:
    build:
      context: ../../services/subscription-service
    container_name: subscription-service
    ports:
      - "${SUBSCRIPTION_SERVICE_PORT:-8081}:8081"
    env_file:
      - ../../.env.dev
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE=http://eureka-server:8761/eureka/
      - KEYCLOAK_ISSUER_URI=${KEYCLOAK_ISSUER_URI}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://subscription-postgres:5432/${SUBSCRIPTION_DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${SUBSCRIPTION_DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SUBSCRIPTION_DB_PASSWORD}
      - SIGNATURE_KEY_SECRET=${SIGNATURE_KEY_SECRET}
      - EUREKA_INSTANCE_HOSTNAME=subscription-service
      - SERVER_PORT=8081
      - MANAGEMENT_TRACING_ENABLED=false
    depends_on:
      subscription-postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - sub-engine-network

  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    command: [ "-config.file=/etc/tempo/tempo.yaml" ]
    volumes:
      - ../tempo/tempo.yaml:/etc/tempo/tempo.yaml
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"
      - "9411:9411"
    networks:
      - sub-engine-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ../loki/loki-config.yaml:/etc/loki/loki-config.yaml
      - loki_data:/loki
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.75'
        reservations:
          memory: 192M
          cpus: '0.375'
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3100/ready" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sub-engine-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak
    command:
      - start-dev
      - --import-realm
    ports:
      - "8080:8080"
    env_file:
      - ../../.env.dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ../keycloak/realm-config.json:/opt/keycloak/data/import/realm-config.json
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    networks:
      - sub-engine-network

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    ports:
      - "9080:9080"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ../alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:9080
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.125'
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:9080/ready" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sub-engine-network

  keycloak-postgres:
    image: postgres:17-alpine
    container_name: keycloak-postgres
    env_file:
      - ../../.env.dev
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USERNAME}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
    ports:
      - "${KEYCLOAK_DB_PORT}:5432"
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USERNAME} -d ${KEYCLOAK_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sub-engine-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    networks:
      - sub-engine-network

  subscription-postgres:
    image: postgres:17-alpine
    container_name: subscription-postgres
    env_file:
      - ../../.env.dev
    environment:
      POSTGRES_USER: ${SUBSCRIPTION_DB_USERNAME}
      POSTGRES_PASSWORD: ${SUBSCRIPTION_DB_PASSWORD}
      POSTGRES_DB: ${SUBSCRIPTION_DB_NAME}
    ports:
      - "${SUBSCRIPTION_DB_PORT}:5432"
    volumes:
      - subscription_postgres_data:/var/lib/postgresql/data
      - ../../infra/databases/subscription:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SUBSCRIPTION_DB_USERNAME} -d ${SUBSCRIPTION_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sub-engine-network

  billing-service:
    build:
      context: ../../services/billing-service
    container_name: billing-service
    ports:
      - "${BILLING_SERVICE_PORT}:8080"
    env_file:
      - ../../.env.dev
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JAVA_OPTS: ${JAVA_OPTS}
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_DATASOURCE_URL: jdbc:postgresql://billing-postgres:5432/${BILLING_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${BILLING_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${BILLING_DB_PASSWORD}
      SIGNATURE_KEY_SECRET: ${SIGNATURE_KEY_SECRET}
      EUREKA_INSTANCE_HOSTNAME: billing-service
    depends_on:
      billing-postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sub-engine-network

  billing-postgres:
    image: postgres:17-alpine
    container_name: billing-postgres
    env_file:
      - ../../.env.dev
    environment:
      POSTGRES_USER: ${BILLING_DB_USERNAME}
      POSTGRES_PASSWORD: ${BILLING_DB_PASSWORD}
      POSTGRES_DB: ${BILLING_DB_NAME}
    ports:
      - "${BILLING_DB_PORT}:5432"
    volumes:
      - billing_postgres_data:/var/lib/postgresql/data
      - ./databases/billing:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${BILLING_DB_USERNAME} -d ${BILLING_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sub-engine-network

  worker-service:
    build:
      context: ../../services/worker-service
    container_name: worker-service
    ports:
      - "${WORKER_SERVICE_PORT}:8080"
    env_file:
      - ../../.env.dev
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JAVA_OPTS: ${JAVA_OPTS}
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/worker
      SIGNATURE_KEY_SECRET: ${SIGNATURE_KEY_SECRET}
      EUREKA_INSTANCE_HOSTNAME: worker-service
    depends_on:
      mongodb:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sub-engine-network

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "${MONGODB_PORT}:27017"
    env_file:
      - ../../.env.dev
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sub-engine-network

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    env_file:
      - ../../.env.dev
    environment:
      KAFKA_KRAFT_MODE: ${KAFKA_KRAFT_MODE}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE}
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sub-engine-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - sub-engine-network

  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    env_file:
      - ../../.env.dev
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning
      - ../grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sub-engine-network

  subscription-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: subscription-postgres-exporter
    depends_on:
      subscription-postgres:
        condition: service_healthy
    env_file:
      - ../../.env.dev
    environment:
      DATA_SOURCE_NAME: "postgresql://${SUBSCRIPTION_DB_USERNAME}:${SUBSCRIPTION_DB_PASSWORD}@subscription-postgres:5432/${SUBSCRIPTION_DB_NAME}?sslmode=disable"
    ports:
      - "${SUBSCRIPTION_EXPORTER_PORT}:9187"
    networks:
      - sub-engine-network

  billing-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: billing-postgres-exporter
    depends_on:
      billing-postgres:
        condition: service_healthy
    env_file:
      - ../../.env.dev
    environment:
      DATA_SOURCE_NAME: "postgresql://${BILLING_DB_USERNAME}:${BILLING_DB_PASSWORD}@billing-postgres:5432/${BILLING_DB_NAME}?sslmode=disable"
    ports:
      - "${BILLING_EXPORTER_PORT}:9187"
    networks:
      - sub-engine-network

volumes:
  keycloak_postgres_data:
  subscription_postgres_data:
  billing_postgres_data:
  mongo_data:
  tempo_data:
  redis_data:
  kafka_data:
  loki_data:
  prometheus_data:
  grafana_data:

networks:
  sub-engine-network:
    driver: bridge
    name: sub-engine-network
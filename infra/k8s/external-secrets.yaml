---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager-store
  namespace: sub-engine
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
---
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: sub-engine
type: Opaque
data:
  access-key-id: YOUR_AWS_ACCESS_KEY_ID
  secret-access-key: YOUR_AWS_SECRET_ACCESS_KEY
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: subscription-db-secret
  namespace: sub-engine
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager-store
    kind: SecretStore
  target:
    name: subscription-db-secret
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: sub-engine/subscription-db
      property: username
  - secretKey: password
    remoteRef:
      key: sub-engine/subscription-db
      property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: billing-db-secret
  namespace: sub-engine
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager-store
    kind: SecretStore
  target:
    name: billing-db-secret
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: sub-engine/billing-db
      property: username
  - secretKey: password
    remoteRef:
      key: sub-engine/billing-db
      property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-client-secret
  namespace: sub-engine
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager-store
    kind: SecretStore
  target:
    name: keycloak-client-secret
    creationPolicy: Owner
  data:
  - secretKey: client-secret
    remoteRef:
      key: sub-engine/keycloak
      property: client-secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jwt-signature-secret
  namespace: sub-engine
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager-store
    kind: SecretStore
  target:
    name: jwt-signature-secret
    creationPolicy: Owner
  data:
  - secretKey: signature-key
    remoteRef:
      key: sub-engine/jwt
      property: signature-key

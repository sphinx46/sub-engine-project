apiVersion: v1
kind: Namespace
metadata:
  name: sub-engine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: sub-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: eureka-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: SERVER_PORT
              value: "8761"
            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "false"
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE
              value: "http://eureka-server:8761/eureka/"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "eureka-server"
            - name: EUREKA_SERVER_ENABLE_SELF_PRESERVATION
              value: "false"
            - name: EUREKA_SERVER_EVICTION_INTERVAL_TIMER_IN_MS
              value: "5000"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: sub-engine
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: sub-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          env:
            - name: SERVER_PORT
              value: "8084"
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE
              value: "http://eureka-server:8761/eureka/"
            - name: KEYCLOAK_ISSUER_URI
              value: "http://keycloak:8080/realms/sub-engine"
            - name: KEYCLOAK_CLIENT_ID
              value: "api-gateway"
            - name: KEYCLOAK_CLIENT_SECRET
              value: "your-client-secret-here"
            - name: SIGNATURE_KEY_SECRET
              value: "your-256-bit-secret-key-for-jwt-signature"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: SPRING_REDIS_TIMEOUT
              value: "5000"
            - name: SPRING_REDIS_CONNECT_TIMEOUT
              value: "5000"
            - name: SPRING_REDIS_LETTUCE_SHUTDOWN_TIMEOUT
              value: "100ms"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    sleep 5
                    curl -X POST http://localhost:8084/actuator/shutdown || true
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: sub-engine
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8084
      targetPort: 8084
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscription-service
  namespace: sub-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: subscription-service
  template:
    metadata:
      labels:
        app: subscription-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:17-alpine
          env:
            - name: PGPASSWORD
              value: "subscription"
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h subscription-postgres -U subscription -d subscription -t 5; do
                echo "Waiting for PostgreSQL to be ready..."
                sleep 5
              done
              echo "PostgreSQL is ready!"
        - name: wait-for-kafka
          image: apache/kafka:3.7.0
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Kafka to be ready..."
              until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 > /dev/null 2>&1; do
                echo "Kafka not ready yet, retrying in 5 seconds..."
                sleep 5
              done
              echo "Kafka is ready!"
        - name: wait-for-eureka
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              until curl -s http://eureka-server:8761/actuator/health | grep -q '"status":"UP"'; do
                echo "Waiting for Eureka to be ready..."
                sleep 5
              done
              echo "Eureka is ready!"
      containers:
        - name: subscription-service
          image: subscription-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE
              value: "http://eureka-server:8761/eureka/"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "subscription-service"
            - name: KEYCLOAK_ISSUER_URI
              value: "http://keycloak:8080/realms/sub-engine"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://subscription-postgres:5432/subscription"
            - name: SPRING_DATASOURCE_USERNAME
              value: "subscription"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "subscription"
            - name: SIGNATURE_KEY_SECRET
              value: "your-256-bit-secret-key-for-jwt-signature"
            - name: MANAGEMENT_TRACING_ENABLED
              value: "false"
            - name: SPRING_REDIS_HOST
              value: "redis"
            - name: SPRING_REDIS_PORT
              value: "6379"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT
              value: "60000"
            - name: SPRING_DATASOURCE_HIKARI_MAX_LIFETIME
              value: "1800000"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "validate"
            - name: SPRING_JPA_SHOW_SQL
              value: "false"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: subscription-service
  namespace: sub-engine
spec:
  selector:
    app: subscription-service
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: sub-engine
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --bind
            - 0.0.0.0
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sub-engine
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: subscription-postgres
  namespace: sub-engine
spec:
  serviceName: subscription-postgres
  replicas: 1
  selector:
    matchLabels:
      app: subscription-postgres
  template:
    metadata:
      labels:
        app: subscription-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: POSTGRES_DB
              value: "subscription"
            - name: POSTGRES_USER
              value: "subscription"
            - name: POSTGRES_PASSWORD
              value: "subscription"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - subscription
                - -d
                - subscription
                - -t
                - "5"
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - subscription
                - -d
                - subscription
                - -t
                - "5"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: subscription-postgres
  namespace: sub-engine
spec:
  selector:
    app: subscription-postgres
  ports:
    - port: 5432
      targetPort: 5432

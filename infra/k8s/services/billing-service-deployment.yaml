apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: sub-engine
  labels:
    app: billing-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: sub-engine-sa
      containers:
        - name: billing-service
          image: ghcr.io/mordvinov-dev/services/billing-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: SERVER_PORT
              value: "8082"
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE
              value: "http://eureka-server:8761/eureka/"
            - name: KEYCLOAK_ISSUER_URI
              value: "http://keycloak:8080/realms/sub-engine"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://billing-postgres:5432/billing"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: billing-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: billing-secret
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SIGNATURE_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: SIGNATURE_KEY_SECRET
            - name: EUREKA_INSTANCE_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: YOOKASSA_SHOP_ID
              valueFrom:
                secretKeyRef:
                  name: youkassa-secret
                  key: YOOKASSA_SHOP_ID
            - name: YOOKASSA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: youkassa-secret
                  key: YOOKASSA_SECRET_KEY
            - name: YOOKASSA_RETURN_URL
              value: "http://localhost:8084/api/billing/return"
            - name: YOOKASSA_WEBHOOK_URL
              value: "https://api.example.com/api/billing/webhook/yookassa"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 10
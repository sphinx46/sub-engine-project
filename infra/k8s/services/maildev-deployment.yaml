apiVersion: apps/v1
kind: Deployment
metadata:
  name: maildev
  namespace: sub-engine
  labels:
    app: maildev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maildev
  template:
    metadata:
      labels:
        app: maildev
    spec:
      containers:
        - name: maildev
          image: maildev/maildev:latest
          ports:
            - containerPort: 1080
              name: web
            - containerPort: 1025
              name: smtp
          env:
            - name: MAILDEV_SMTP_PORT
              value: "1025"
            - name: MAILDEV_WEB_PORT
              value: "1080"
            - name: MAILDEV_INCOMING_USER
              value: ""
            - name: MAILDEV_INCOMING_PASS
              value: ""
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 1080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 1080
            initialDelaySeconds: 20
            periodSeconds: 5
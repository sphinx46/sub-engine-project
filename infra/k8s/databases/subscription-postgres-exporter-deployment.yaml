apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscription-postgres-exporter
  namespace: sub-engine
  labels:
    app: subscription-postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: subscription-postgres-exporter
  template:
    metadata:
      labels:
        app: subscription-postgres-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      containers:
        - name: exporter
          image: prometheuscommunity/postgres-exporter:latest
          ports:
            - containerPort: 9187
              name: metrics
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://subscription:subscription@subscription-postgres:5432/subscription?sslmode=disable"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
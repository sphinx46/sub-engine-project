name: Test & Build

on:
  push:
    branches: [main, develop-main, feature-main, feature/**]
  pull_request:
    branches: [main, develop-main, feature-main, feature/**]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [services/eureka-server, services/api-gateway, services/subscription-service, services/worker-service, services/billing-service]
        java-version: [21]

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      mongodb:
        image: mongo:7.0-alpine
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Run unit tests with coverage
        run: |
          mvn -B clean verify -pl ${{ matrix.service }} -am -Djacoco.skip=false
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: ${{ matrix.service == 'services/billing-service' && 'jdbc:tc:postgresql:17-alpine:///billing_test' || 'jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_UPPER=false' }}
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${{ matrix.service == 'services/billing-service' && 'org.testcontainers.jdbc.ContainerDatabaseDriver' || 'org.h2.Driver' }}
          SPRING_DATASOURCE_USERNAME: ${{ matrix.service == 'services/billing-service' && 'test_user' || 'sa' }}
          SPRING_DATASOURCE_PASSWORD: ${{ matrix.service == 'services/billing-service' && 'test_password' || 'password' }}
          SPRING_JPA_DATABASE_PLATFORM: ${{ matrix.service == 'services/billing-service' && 'org.hibernate.dialect.PostgreSQLDialect' || 'org.hibernate.dialect.H2Dialect' }}
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
          MONGODB_TEST_URI: mongodb://localhost:27017/test
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          SIGNATURE_KEY_SECRET: ${{ secrets.SIGNATURE_KEY_SECRET }}
          YOOKASSA_SHOP_ID: ${{ secrets.YOOKASSA_SHOP_ID }}
          YOOKASSA_SECRET_KEY: ${{ secrets.YOOKASSA_SECRET_KEY }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}

      - name: Set safe service name
        id: safe-name
        run: |
          SAFE_NAME=$(echo "${{ matrix.service }}" | tr '/' '-')
          echo "safe-name=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ steps.safe-name.outputs.safe-name }}
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 30

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports-${{ steps.safe-name.outputs.safe-name }}
          path: |
            **/target/site/jacoco/
            **/target/jacoco.xml
            **/target/jacoco.exec
          retention-days: 30

  code-analysis:
    name: Code Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Run Super-Linter
        continue-on-error: true
        uses: github/super-linter@v5
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_JAVA: true
          VALIDATE_YAML: true
          VALIDATE_DOCKERFILE_HADOLINT: true
          VALIDATE_MARKDOWN: true

      - name: Create temporary .codacy.yml
        run: |
          cat > .codacy.yml << 'EOF'
          ---
          exclude_paths:        
            - "**/*.sql"
            - "infrastructure/**"
          EOF

      - name: Codacy analysis
        continue-on-error: true
        uses: codacy/codacy-analysis-cli-action@master
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true

      - name: Remove temporary .codacy.yml
        if: always()
        run: rm -f .codacy.yml

      - name: Cache OWASP dependency data
        if: github.event_name == 'pull_request'
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-owasp-data-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-owasp-data-

      - name: Fix permissions
        if: github.event_name == 'pull_request'
        run: sudo chown -R $USER:$USER .

      - name: Run OWASP dependency check
        if: github.event_name == 'pull_request'
        run: |
          mvn -B clean compile org.owasp:dependency-check-maven:check -DskipTests 

      - name: Check for vulnerable dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload security results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [unit-tests, code-analysis]
    if: github.event_name == 'push'

    strategy:
      matrix:
        service: [services/eureka-server, services/api-gateway, services/subscription-service, services/worker-service, services/billing-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Build service artifact
        run: |
          mvn -B -pl ${{ matrix.service }} -am package -DskipTests -Djacoco.skip=true

      - name: Set safe service name
        id: safe-name
        run: |
          SAFE_NAME=$(echo "${{ matrix.service }}" | tr '/' '-')
          echo "safe-name=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop-main' || startsWith(github.ref, 'refs/heads/feature'))

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mongodb:
        image: mongo:7.0-alpine
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Run integration tests
        run: |
          mvn -B -pl services/api-gateway,services/eureka-server,services/subscription-service,services/worker-service,services/billing-service -am verify -DskipUnitTests=true -Djacoco.skip=true
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_UPPER=false
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: password
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          MONGODB_TEST_URI: mongodb://localhost:27017/test
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          SIGNATURE_KEY_SECRET: ${{ secrets.SIGNATURE_KEY_SECRET }}
          YOOKASSA_SHOP_ID: ${{ secrets.YOOKASSA_SHOP_ID }}
          YOOKASSA_SECRET_KEY: ${{ secrets.YOOKASSA_SECRET_KEY }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}